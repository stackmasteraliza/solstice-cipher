<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22356b"/>
      <stop offset="1" stop-color="#e8853a"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff7a3d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffce5a" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffce5a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="120" cy="90" r="2"/><circle cx="260" cy="60" r="1.6"/><circle cx="380" cy="120" r="2.2"/>
    <circle cx="520" cy="70" r="1.5"/><circle cx="900" cy="80" r="2"/><circle cx="1040" cy="120" r="1.8"/>
    <circle cx="1120" cy="60" r="2.2"/><circle cx="700" cy="50" r="1.4"/><circle cx="180" cy="170" r="1.5"/>
  </g>
  <!-- sun glow + sun -->
  <circle cx="600" cy="330" r="320" fill="url(#glow)"/>
  <circle cx="600" cy="330" r="120" fill="url(#sun)"/>
  <g stroke="#ffd24a" stroke-width="9" stroke-linecap="round" opacity="0.85">
    <line x1="600" y1="150" x2="600" y2="185"/><line x1="600" y1="475" x2="600" y2="510"/>
    <line x1="420" y1="330" x2="455" y2="330"/><line x1="745" y1="330" x2="780" y2="330"/>
    <line x1="473" y1="203" x2="498" y2="228"/><line x1="702" y1="432" x2="727" y2="457"/>
    <line x1="727" y1="203" x2="702" y2="228"/><line x1="498" y1="432" x2="473" y2="457"/>
  </g>
  <!-- sun face -->
  <g fill="#7a4a12">
    <circle cx="562" cy="318" r="13"/><circle cx="638" cy="318" r="13"/>
  </g>
  <path d="M560 350 q40 34 80 0" stroke="#7a4a12" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- title -->
  <text x="600" y="585" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="900" font-size="92" letter-spacing="10" fill="#fff7e6">SOLSTICE</text>
  <text x="600" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="4" fill="#fff7e6" opacity="0.92">feed the light · hold back the night · an ode to Alan Turing</text>
</svg>
