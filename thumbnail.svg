<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0a0e2e"/>
      <stop offset="0.45" stop-color="#3b1d6e"/>
      <stop offset="0.75" stop-color="#9c3b86"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#ffce5a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffce5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="42%" cy="38%" r="62%">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.45" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff7a2d"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="38%" r="62%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#ffe49a"/>
      <stop offset="1" stop-color="#ff9a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff8a2d"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="46%" r="62%">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glowB" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="glowS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- god rays from the sun -->
  <g opacity="0.18" filter="url(#glowB)">
    <g transform="translate(940,250)" fill="#ffe9a8">
      <polygon points="0,0 -900,-120 -900,120"/>
      <polygon points="0,0 -780,-360 -560,-520"/>
      <polygon points="0,0 -360,560 -120,720"/>
      <polygon points="0,0 -880,360 -640,540"/>
    </g>
  </g>

  <!-- stars -->
  <g fill="#fff">
    <circle cx="120" cy="70" r="2.2" opacity="0.9"/><circle cx="300" cy="48" r="1.5" opacity="0.7"/>
    <circle cx="470" cy="100" r="1.8" opacity="0.8"/><circle cx="640" cy="56" r="1.4" opacity="0.6"/>
    <circle cx="1180" cy="90" r="2" opacity="0.85"/><circle cx="1080" cy="150" r="1.5" opacity="0.7"/>
    <circle cx="60" cy="240" r="1.6" opacity="0.7"/><circle cx="1230" cy="220" r="1.8" opacity="0.8"/>
    <circle cx="210" cy="150" r="1.3" opacity="0.6"/><circle cx="760" cy="44" r="1.6" opacity="0.7"/>
  </g>

  <!-- floating light motes (bloomed) -->
  <g>
    <g filter="url(#glowB)" fill="#ffd86a">
      <circle cx="430" cy="200" r="10"/><circle cx="690" cy="150" r="7"/><circle cx="250" cy="330" r="8"/>
      <circle cx="560" cy="300" r="6"/><circle cx="800" cy="430" r="9"/>
    </g>
    <g fill="#fff7d6">
      <circle cx="430" cy="200" r="4"/><circle cx="690" cy="150" r="3"/><circle cx="250" cy="330" r="3.4"/>
      <circle cx="560" cy="300" r="2.6"/><circle cx="800" cy="430" r="3.6"/>
    </g>
  </g>

  <!-- the sun -->
  <circle cx="940" cy="250" r="340" fill="url(#bloom)"/>
  <g stroke="#ffd24a" stroke-width="10" stroke-linecap="round" opacity="0.85" filter="url(#glowS)">
    <line x1="940" y1="60" x2="940" y2="95"/><line x1="760" y1="250" x2="795" y2="250"/>
    <line x1="1085" y1="250" x2="1120" y2="250"/><line x1="812" y1="122" x2="838" y2="148"/>
    <line x1="1068" y1="122" x2="1042" y2="148"/><line x1="812" y1="378" x2="838" y2="352"/>
  </g>
  <circle cx="940" cy="250" r="118" fill="url(#sun)"/>
  <circle cx="908" cy="216" r="34" fill="#fffdf4" opacity="0.6" filter="url(#glowS)"/>

  <!-- beast silhouette, lower-left, partially off-frame -->
  <g transform="translate(120,560)">
    <circle cx="0" cy="0" r="220" fill="#7a1ad0" opacity="0.35" filter="url(#glowB)"/>
    <path fill="#14021f" d="M0,-170 L46,-78 150,-110 92,-16 175,46 70,64 86,160 0,104 -86,160 -70,64 -175,46 -92,-16 -150,-110 -46,-78 Z"/>
    <g filter="url(#glowS)">
      <circle cx="-40" cy="-14" r="17" fill="#ff2e50"/><circle cx="40" cy="-14" r="17" fill="#ff2e50"/>
    </g>
    <circle cx="-40" cy="-14" r="7" fill="#fff" opacity="0.9"/><circle cx="40" cy="-14" r="7" fill="#fff" opacity="0.9"/>
  </g>

  <!-- player light orb with comet trail (foreground) -->
  <path d="M250 470 Q 470 540 690 500" stroke="url(#orb)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#glowS)"/>
  <circle cx="690" cy="500" r="46" fill="url(#orb)"/>
  <circle cx="690" cy="500" r="15" fill="#fffef6" filter="url(#glowS)"/>

  <!-- vignette -->
  <rect width="1280" height="720" fill="url(#vig)"/>

  <!-- title -->
  <text x="640" y="612" text-anchor="middle" font-size="172" font-weight="900" letter-spacing="4"
        fill="url(#title)" stroke="#1a0e30" stroke-width="9" paint-order="stroke"
        style="paint-order:stroke fill">SOLSTICE</text>
  <text x="642" y="664" text-anchor="middle" font-size="34" font-weight="800" letter-spacing="8" fill="#fff7e6"
        stroke="#1a0e30" stroke-width="5" paint-order="stroke" style="paint-order:stroke fill">FEED THE LIGHT · HOLD BACK THE NIGHT</text>

  <!-- elegant Turing ribbon -->
  <g>
    <rect x="40" y="40" width="350" height="48" rx="24" fill="#0a0e2e" opacity="0.6"/>
    <rect x="40" y="40" width="350" height="48" rx="24" fill="none" stroke="#ffd24a" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="64" y="72" font-size="24" font-weight="800" letter-spacing="2" fill="#ffd24a">⚙ AN ODE TO ALAN TURING</text>
  </g>
</svg>
