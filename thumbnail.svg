<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101a44"/>
      <stop offset="0.55" stop-color="#5a3a8a"/>
      <stop offset="1" stop-color="#e8853a"/>
    </linearGradient>
    <radialGradient id="sun" cx="42%" cy="38%" r="62%">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff7a3d"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffce5a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffce5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="beast" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#3a0a55"/>
      <stop offset="0.6" stop-color="#7a1ad0"/>
      <stop offset="1" stop-color="#7a1ad0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#fff" opacity="0.85">
    <circle cx="90" cy="80" r="2.4"/><circle cx="240" cy="50" r="1.8"/><circle cx="360" cy="120" r="2"/>
    <circle cx="520" cy="60" r="1.6"/><circle cx="1130" cy="70" r="2.2"/><circle cx="980" cy="120" r="1.8"/>
    <circle cx="700" cy="44" r="1.6"/><circle cx="160" cy="170" r="1.6"/><circle cx="1210" cy="150" r="2"/>
    <circle cx="60" cy="300" r="1.8"/><circle cx="1240" cy="280" r="1.6"/>
  </g>

  <!-- the beast (left, menacing) -->
  <circle cx="250" cy="430" r="240" fill="url(#beast)" opacity="0.9"/>
  <g transform="translate(250,430)">
    <path fill="#160226" d="M0,-150 L40,-70 130,-95 80,-15 150,40 60,55 75,140 0,90 -75,140 -60,55 -150,40 -80,-15 -130,-95 -40,-70 Z"/>
    <circle cx="-34" cy="-12" r="16" fill="#ff3a5a"/>
    <circle cx="34" cy="-12" r="16" fill="#ff3a5a"/>
    <circle cx="-34" cy="-12" r="7" fill="#fff" opacity="0.85"/>
    <circle cx="34" cy="-12" r="7" fill="#fff" opacity="0.85"/>
  </g>

  <!-- sun (right, hero) with face -->
  <circle cx="1010" cy="300" r="350" fill="url(#sunGlow)"/>
  <g stroke="#ffd24a" stroke-width="11" stroke-linecap="round" opacity="0.9">
    <line x1="1010" y1="92" x2="1010" y2="130"/><line x1="1010" y1="470" x2="1010" y2="508"/>
    <line x1="802" y1="300" x2="840" y2="300"/><line x1="1180" y1="300" x2="1218" y2="300"/>
    <line x1="863" y1="153" x2="890" y2="180"/><line x1="1130" y1="420" x2="1157" y2="447"/>
    <line x1="1157" y1="153" x2="1130" y2="180"/><line x1="890" y1="420" x2="863" y2="447"/>
  </g>
  <circle cx="1010" cy="300" r="130" fill="url(#sun)"/>
  <g fill="#7a4a12">
    <circle cx="972" cy="285" r="15"/><circle cx="1048" cy="285" r="15"/>
  </g>
  <path d="M968 322 q42 38 84 0" stroke="#7a4a12" stroke-width="11" fill="none" stroke-linecap="round"/>

  <!-- title -->
  <text x="64" y="540" font-size="170" font-weight="900" letter-spacing="6" fill="#fff7e6" filter="url(#soft)" opacity="0.35">SOLSTICE</text>
  <text x="60" y="535" font-size="170" font-weight="900" letter-spacing="6" fill="#ffe9a8">SOLSTICE</text>
  <text x="66" y="600" font-size="40" font-weight="800" letter-spacing="5" fill="#fff7e6">FEED THE LIGHT · HOLD BACK THE NIGHT</text>

  <!-- badges -->
  <g>
    <rect x="60" y="636" width="430" height="50" rx="25" fill="#000" opacity="0.45"/>
    <text x="84" y="670" font-size="27" font-weight="800" letter-spacing="2" fill="#ffd24a">⚙ AN ODE TO ALAN TURING</text>
  </g>
  <g>
    <rect x="510" y="636" width="360" height="50" rx="25" fill="#000" opacity="0.45"/>
    <text x="534" y="670" font-size="27" font-weight="800" letter-spacing="2" fill="#bfe9ff">20 LEVELS · 2 BOSSES</text>
  </g>

  <!-- top corner tag -->
  <text x="1220" y="700" text-anchor="end" font-size="22" font-weight="700" letter-spacing="2" fill="#fff7e6" opacity="0.8">JUNE SOLSTICE GAME JAM</text>
</svg>
